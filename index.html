<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Duolingo Jr.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+Devanagari:wght@400;700&display=swap');

        :root {
            --duo-green: #58cc02;
            --duo-blue: #1cb0f6;
            --duo-orange: #ff9600;
        }

        body {
            font-family: 'Fredoka One', cursive, 'Noto Sans Devanagari', sans-serif;
            background-color: #f7f7f7;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        .devanagari { font-family: 'Noto Sans Devanagari', sans-serif; }

        .btn-bounce:active { transform: scale(0.95); }
        
        .card-shadow {
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            border: 2px solid #e5e5e5;
        }

        .active-tab {
            border-bottom: 4px solid var(--duo-green);
            color: var(--duo-green);
        }

        #writing-canvas {
            border: 4px dashed #ccc;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Help Modal Styles */
        .glass-overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Top Navigation -->
    <nav class="bg-white border-b-2 border-gray-200 sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl font-bold">ह</div>
            <h1 class="text-xl font-bold text-gray-700 hidden sm:block">Hindi Duo Jr.</h1>
        </div>
        <div class="flex gap-4">
            <div class="flex items-center gap-1 bg-orange-100 px-3 py-1 rounded-full border border-orange-200">
                <span class="text-orange-500">🔥</span>
                <span id="streak-count" class="font-bold text-orange-600">3</span>
            </div>
            <div class="flex items-center gap-1 bg-blue-100 px-3 py-1 rounded-full border border-blue-200">
                <span class="text-blue-500">💎</span>
                <span id="gems-count" class="font-bold text-blue-600">120</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-md mx-auto p-4 pb-24">

        <!-- Word of the Day -->
        <section id="wotd-section" class="bg-white rounded-3xl p-6 card-shadow mb-6 border-blue-400 border-t-8 relative">
            <h2 class="text-blue-500 uppercase text-xs font-black tracking-widest mb-2">Word of the Day</h2>
            <div class="flex items-center justify-between">
                <div>
                    <h3 id="wotd-hindi" class="devanagari text-4xl font-bold text-gray-800">पर्यावरण</h3>
                    <p id="wotd-roman" class="text-gray-500 italic">Paryavaran</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="showHelp(currentWord)" class="w-10 h-10 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center btn-bounce border-2 border-gray-200 font-bold">?</button>
                    <button onclick="speak('पर्यावरण')" class="w-12 h-12 bg-blue-500 text-white rounded-full flex items-center justify-center btn-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                </div>
            </div>
            <div class="mt-4 p-3 bg-blue-50 rounded-xl">
                <p class="text-blue-800 font-bold">Meaning: Environment</p>
                <p class="text-gray-600 text-sm mt-1">हमें अपने पर्यावरण को साफ रखना चाहिए।</p>
            </div>
        </section>

        <!-- Dynamic Content Area -->
        <div id="exercise-container">
            <!-- Content injected via JS -->
        </div>

    </main>

    <!-- Bottom Menu -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-gray-200 p-2 flex justify-around">
        <button onclick="switchTab('listening')" class="flex flex-col items-center p-2 text-gray-400" id="tab-listening">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15.5 8.5a2.121 2.121 0 00-3 0l-4 4a2.121 2.121 0 000 3l4 4a2.121 2.121 0 003 0l4-4a2.121 2.121 0 000-3l-4-4z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[10px] mt-1 uppercase font-black">Listen</span>
        </button>
        <button onclick="switchTab('writing')" class="flex flex-col items-center p-2 text-gray-400" id="tab-writing">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
            <span class="text-[10px] mt-1 uppercase font-black">Write</span>
        </button>
        <button onclick="switchTab('speaking')" class="flex flex-col items-center p-2 text-gray-400" id="tab-speaking">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            <span class="text-[10px] mt-1 uppercase font-black">Speak</span>
        </button>
    </footer>

    <!-- Help Modal -->
    <div id="help-modal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 glass-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 card-shadow border-4 border-blue-400">
            <h3 class="text-2xl font-black text-blue-500 mb-4">Help Guide! 💡</h3>
            <div id="help-content">
                <!-- Dynamic help content -->
            </div>
            <button onclick="closeHelp()" class="mt-8 w-full bg-blue-500 text-white py-4 rounded-2xl font-black text-xl btn-bounce">GOT IT!</button>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="feedback-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-end justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-8 transform translate-y-0" id="modal-content">
            <div id="modal-status" class="text-center">
                <div id="modal-icon" class="text-6xl mb-4">🎉</div>
                <h2 id="modal-title" class="text-3xl font-black mb-2 text-green-600">Great Job!</h2>
                <p id="modal-desc" class="text-gray-600 mb-8 font-bold">You earned +10 Gems</p>
                <button onclick="closeModal()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-xl btn-bounce card-shadow" style="box-shadow: 0 6px 0px #3c8c00;">CONTINUE</button>
            </div>
        </div>
    </div>

    <script>
        const advancedWords = [
            { 
                hindi: "सफलता", 
                roman: "Safalta", 
                english: "Success", 
                example: "मेहनत से सफलता मिलती है।",
                pronunciation: "Sa-phal-ta (Gentle 'ph' like in 'phone')",
                definition: "Winning or achieving a goal you worked hard for."
            },
            { 
                hindi: "परिश्रम", 
                roman: "Parishram", 
                english: "Hard work", 
                example: "परिश्रम ही कुंजी है।",
                pronunciation: "Pa-ri-shram (Roll the 'r' slightly)",
                definition: "Putting in a lot of effort to do something difficult."
            },
            { 
                hindi: "जिज्ञासा", 
                roman: "Jigyasa", 
                english: "Curiosity", 
                example: "बच्चों में जिज्ञासा होती है।",
                pronunciation: "Jig-yaa-saa (Strong 'J' sound)",
                definition: "A strong desire to know or learn something new."
            },
            { 
                hindi: "स्वतंत्रता", 
                roman: "Swatantrata", 
                english: "Independence", 
                example: "भारत की स्वतंत्रता महत्वपूर्ण है।",
                pronunciation: "Sva-tan-tra-ta",
                definition: "The freedom to make your own choices and be free."
            },
            { 
                hindi: "अनुभव", 
                roman: "Anubhav", 
                english: "Experience", 
                example: "यह मेरा पहला अनुभव है।",
                pronunciation: "A-nu-bhav (Gentle 'bh' sound)",
                definition: "Knowledge or skill gained from doing things over time."
            }
        ];

        let currentTab = 'listening';
        let gems = 120;
        let streak = 3;
        let currentWord = advancedWords[0];

        // Speech
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.7;
            window.speechSynthesis.speak(utterance);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('footer button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            nextExercise();
        }

        function nextExercise() {
            currentWord = advancedWords[Math.floor(Math.random() * advancedWords.length)];
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('exercise-container');
            
            let helpBtn = `
                <button onclick="showHelp(currentWord)" class="absolute top-4 right-4 w-10 h-10 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center font-bold border-2 border-gray-200 btn-bounce">?</button>
            `;

            if (currentTab === 'listening') {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl card-shadow text-center relative">
                        ${helpBtn}
                        <div class="text-green-500 font-black mb-4 uppercase tracking-widest text-sm">Listen & Choose</div>
                        <button onclick="speak('${currentWord.hindi}')" class="w-24 h-24 bg-green-500 text-white rounded-full mx-auto mb-8 pulse flex items-center justify-center shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        </button>
                        <div class="grid grid-cols-1 gap-3">
                            ${shuffleOptions(currentWord.english).map(opt => `
                                <button onclick="checkAnswer('${opt}', '${currentWord.english}')" class="p-4 rounded-2xl border-2 border-gray-200 hover:bg-gray-50 font-bold text-gray-700 btn-bounce">${opt}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (currentTab === 'writing') {
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-3xl card-shadow text-center relative">
                        ${helpBtn}
                        <div class="text-orange-500 font-black mb-2 uppercase tracking-widest text-sm">Write This Word</div>
                        <h2 class="devanagari text-5xl font-bold mb-4 text-gray-800">${currentWord.hindi}</h2>
                        <canvas id="writing-canvas" class="w-full h-64 rounded-xl mb-4"></canvas>
                        <div class="flex gap-2">
                            <button onclick="clearCanvas()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-gray-500">Clear</button>
                            <button onclick="triggerWin('Beautiful handwriting!')" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold card-shadow" style="box-shadow: 0 4px 0 #cc7700;">Submit</button>
                        </div>
                    </div>
                `;
                initCanvas();
            } else if (currentTab === 'speaking') {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl card-shadow text-center relative">
                        ${helpBtn}
                        <div class="text-blue-500 font-black mb-4 uppercase tracking-widest text-sm">Pronounce it!</div>
                        <div class="mb-8">
                            <h2 class="devanagari text-6xl font-bold text-gray-800">${currentWord.hindi}</h2>
                            <p class="text-gray-400 font-mono text-xl">${currentWord.roman}</p>
                        </div>
                        <button id="mic-btn" onclick="startRecognition('${currentWord.hindi}')" class="w-24 h-24 bg-blue-500 text-white rounded-full mx-auto flex items-center justify-center shadow-lg btn-bounce">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <p id="mic-status" class="mt-4 text-gray-500 font-bold">Tap to speak</p>
                    </div>
                `;
            }
        }

        // Help System
        function showHelp(word) {
            const helpModal = document.getElementById('help-modal');
            const helpContent = document.getElementById('help-content');
            
            helpContent.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <p class="text-sm font-black text-gray-400 uppercase">Meaning</p>
                        <p class="text-lg text-gray-700 font-bold">${word.definition}</p>
                    </div>
                    <div>
                        <p class="text-sm font-black text-gray-400 uppercase">How to say it</p>
                        <p class="text-lg text-gray-700 font-bold italic">"${word.pronunciation}"</p>
                    </div>
                    <button onclick="speak('${word.hindi}')" class="flex items-center gap-2 text-blue-500 font-bold">
                        <span class="bg-blue-100 p-2 rounded-full">🔊</span> Hear again
                    </button>
                </div>
            `;
            
            helpModal.classList.remove('hidden');
            helpModal.classList.add('flex');
        }

        function closeHelp() {
            document.getElementById('help-modal').classList.add('hidden');
            document.getElementById('help-modal').classList.remove('flex');
        }

        // Mechanics
        function shuffleOptions(correct) {
            let options = [correct, "Failure", "Laziness", "Confusion", "Boredom"];
            return options.sort(() => Math.random() - 0.5).slice(0, 4);
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                triggerWin();
            } else {
                showToast("Try again! (फिर से कोशिश करें)");
            }
        }

        function triggerWin(msg = "Sahi hai! (Correct!)") {
            gems += 10;
            document.getElementById('gems-count').innerText = gems;
            showModal("🎉", "Perfect!", msg);
            playSuccessSound();
        }

        // Canvas Logic
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('writing-canvas');
            if(!canvas) return;
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#333';

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const end = () => { drawing = false; };
            const move = (e) => {
                if (!drawing) return;
                const p = getPos(e);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('touchstart', start);
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('touchmove', move);
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // Voice Logic
        function startRecognition(target) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast("Speech not supported on this browser.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            const micBtn = document.getElementById('mic-btn');
            const micStatus = document.getElementById('mic-status');

            micBtn.classList.add('bg-red-500');
            micStatus.innerText = "Listening...";

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript;
                if (result.includes(target) || target.includes(result)) {
                    triggerWin(`You said it perfectly!`);
                } else {
                    showToast(`Sounded like: ${result}. Try again!`);
                }
            };

            recognition.onend = () => {
                micBtn.classList.remove('bg-red-500');
                micStatus.innerText = "Tap to speak again";
            };

            recognition.start();
        }

        // Feedback UI
        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            document.getElementById('feedback-modal').classList.add('hidden');
            document.getElementById('feedback-modal').classList.remove('flex');
            nextExercise();
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-2xl z-[300] font-bold shadow-xl";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function playSuccessSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.frequency.setValueAtTime(523.25, context.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.50, context.currentTime + 0.1); // C6
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
            osc.connect(gain); gain.connect(context.destination);
            osc.start(); osc.stop(context.currentTime + 0.3);
        }

        window.onload = () => switchTab('listening');
    </script>
</body>
</html>
